apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: settlement-remuneration-unit-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bruno-blauzius/projects-manifest
    targetRevision: main
    path: settlement-remuneration-unit
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
