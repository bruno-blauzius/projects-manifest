apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: settlement-remuneration-unit-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/bruno-blauzius/projects-manifest.git
    targetRevision: HEAD
    path: settlement-remuneration-unit-kafka-homolog-local

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true # Remove recursos deletados do repo
      selfHeal: true # Sincroniza se divergir
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
