apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-remuneration-unit-app-exclusao
  namespace: dev
  labels:
    app: settlement-remuneration-unit-app
    component: exclusao-processor
    version: v1
    workload-type: exclusao
    managed-by: keda
    owner: devops-team
  annotations:
    description: "Kafka consumer for settlement exclusion - delete operations"
    author: "Bruno Blauzius Schuindt"
spec:
  # replicas gerenciadas pelo KEDA HPA - não definir aqui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: settlement-remuneration-unit-app
      workload-type: exclusao
  template:
    metadata:
      labels:
        app: settlement-remuneration-unit-app
        component: exclusao-processor
        workload-type: exclusao
        version: v1
    spec:
      serviceAccountName: settlement-remuneration-unit-app
      automountServiceAccountToken: false
      volumes:
      - name: tmp
        emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        fsGroup: 100000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: settlement-remuneration-unit-app
                  workload-type: exclusao
              topologyKey: kubernetes.io/hostname
      containers:
      - name: settlement-remuneration-unit-exclusao
        image: lambda-settlement-remuneration-unit:dev
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        env:
        # Configurações específicas para processamento de exclusão
        - name: EXCLUSAO_PROCESS
          value: "true"
        - name: THREAD_WORKERS
          value: "2"
        - name: THREAD_QUEUE_SIZE
          value: "200"
        - name: KAFKA_TOPIC
          value: "settlement-remuneration-unit-homolog-exclusao"
        - name: KAFKA_GROUP_ID
          value: "settlement-remuneration-unit-exclusao-processor-group"
        envFrom:
        - secretRef:
            name: settlement-remuneration-unit-secret
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - test -f /proc/1/cmdline
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - kill -0 1 2>/dev/null
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "256Mi"
            cpu: "500m"
            ephemeral-storage: "2Gi"
