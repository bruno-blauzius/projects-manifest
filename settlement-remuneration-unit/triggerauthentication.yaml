apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: kafka-trigger-auth
  namespace: dev
spec:
  secretTargetRef:
  - parameter: username
    name: settlement-remuneration-unit-secret
    key: KAFKA_USER # ← CORRIGIDO
  - parameter: password
    name: settlement-remuneration-unit-secret
    key: KAFKA_PASSWORD # ← CORRIGIDO
  - parameter: brokers
    name: settlement-remuneration-unit-secret
    key: KAFKA_HOSTS # ← CORRIGIDO
