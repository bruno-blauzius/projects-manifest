apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kafka-consumer-exclusao
  namespace: dev
  labels:
    app: settlement-remuneration-unit-app
    workload-type: exclusao
  annotations:
    description: "KEDA scaler for settlement deletion/exclusion processing"
spec:
  scaleTargetRef:
    name: settlement-remuneration-unit-app-exclusao
  minReplicaCount: 1 # Mínimo 1 pod
  maxReplicaCount: 4 # Menos escalável - operações críticas de exclusão
  pollingInterval: 45 # Menos agressivo - verifica a cada 45s
  cooldownPeriod: 180 # Desescala mais lentamente (3 minutos)
  fallback:
    failureThreshold: 5
    replicas: 1
  triggers:
  - type: kafka
    metadata:
      brokers: "placeholder" # Lido do TriggerAuthentication
      consumerGroup: settlement-remuneration-unit-exclusao-group
      topic: settlement-remuneration-unit-kafka-local
      lagThreshold: "15" # Menos sensível - aguarda mais lag antes de escalar
      offsetResetPolicy: latest
      scaleToZeroOnInvalidOffset: "false"
      allowIdleConsumers: "false"
      excludePersistentLag: "true"
      sasl: scram_sha512
      tls: enable
      version: "latest"
    authenticationRef:
      name: kafka-trigger-auth
