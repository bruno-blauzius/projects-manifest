apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kafka-consumer-fechamento
  namespace: dev
  labels:
    app: settlement-remuneration-unit-app
    workload-type: fechamento
  annotations:
    description: "KEDA scaler for settlement closure processing"
spec:
  scaleTargetRef:
    name: settlement-remuneration-unit-app-fechamento
  minReplicaCount: 1 # Mínimo 1 pod sempre ativo
  maxReplicaCount: 8 # Pode escalar bastante para processar fechamentos
  pollingInterval: 30 # Verifica a cada 30s
  cooldownPeriod: 120 # Desescala após 2 minutos
  fallback:
    failureThreshold: 5
    replicas: 1
  triggers:
  - type: kafka
    metadata:
      brokers: "placeholder" # Lido do TriggerAuthentication
      consumerGroup: settlement-remuneration-unit-fechamento-group
      topic: settlement-remuneration-unit-kafka-local
      lagThreshold: "10" # Escala com lag moderado (meio termo)
      offsetResetPolicy: latest
      scaleToZeroOnInvalidOffset: "false"
      allowIdleConsumers: "false"
      excludePersistentLag: "true"
      sasl: scram_sha512
      tls: enable
      version: "latest"
    authenticationRef:
      name: kafka-trigger-auth
